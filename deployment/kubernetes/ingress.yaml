apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane
  namespace: drone-swarm
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: drone-swarm.example.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: control-plane
                port:
                  number: 80

