name: Nightly Deep Validation

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gcc-werror:
    name: GCC Warnings As Errors
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-linux-deps
      - name: Configure
        shell: bash
        run: cmake --preset linux-gcc-release-werror
      - name: Build
        shell: bash
        run: cmake --build --preset linux-gcc-release-werror
      - name: Test
        shell: bash
        run: ctest --preset linux-gcc-release-werror --output-on-failure --output-junit "${RUNNER_TEMP}/gcc-werror-junit.xml"
      - name: Upload GCC werror reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gcc-werror-${{ github.sha }}
          path: ${{ runner.temp }}/gcc-werror-junit.xml
          retention-days: 30

  gcc-minimal:
    name: GCC Minimal Profile
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-linux-deps
      - name: Configure
        shell: bash
        run: cmake --preset linux-gcc-release-minimal
      - name: Build
        shell: bash
        run: cmake --build --preset linux-gcc-release-minimal
      - name: Test
        shell: bash
        run: ctest --preset linux-gcc-release-minimal --output-on-failure --output-junit "${RUNNER_TEMP}/gcc-minimal-junit.xml"
      - name: Upload GCC minimal reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gcc-minimal-${{ github.sha }}
          path: ${{ runner.temp }}/gcc-minimal-junit.xml
          retention-days: 30

  clang-debug:
    name: Clang Debug
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-linux-deps
      - name: Configure
        shell: bash
        run: cmake --preset linux-clang-debug
      - name: Build
        shell: bash
        run: cmake --build --preset linux-clang-debug
      - name: Test
        shell: bash
        run: ctest --preset linux-clang-debug --output-on-failure --output-junit "${RUNNER_TEMP}/clang-debug-junit.xml"
      - name: Upload Clang debug reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clang-debug-${{ github.sha }}
          path: ${{ runner.temp }}/clang-debug-junit.xml
          retention-days: 30

  sanitizer-gcc:
    name: GCC ASan UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-linux-deps
      - name: Configure
        shell: bash
        run: cmake --preset linux-gcc-asan-ubsan
      - name: Build
        shell: bash
        run: cmake --build --preset linux-gcc-asan-ubsan -j1
      - name: Test
        shell: bash
        run: |
          set -euxo pipefail
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1:abort_on_error=1 \
          UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
          ctest --preset linux-gcc-asan-ubsan --output-on-failure --output-junit "${RUNNER_TEMP}/gcc-asan-ubsan-junit.xml"
      - name: Upload GCC sanitizer reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gcc-asan-ubsan-${{ github.sha }}
          path: ${{ runner.temp }}/gcc-asan-ubsan-junit.xml
          retention-days: 30

  sanitizer-clang:
    name: Clang ASan UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-linux-deps
      - name: Configure
        shell: bash
        run: cmake --preset linux-clang-asan-ubsan
      - name: Build
        shell: bash
        run: cmake --build --preset linux-clang-asan-ubsan -j1
      - name: Test
        shell: bash
        run: |
          set -euxo pipefail
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1:abort_on_error=1 \
          UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
          ctest --preset linux-clang-asan-ubsan --output-on-failure --output-junit "${RUNNER_TEMP}/clang-asan-ubsan-junit.xml"
      - name: Upload Clang sanitizer reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clang-asan-ubsan-${{ github.sha }}
          path: ${{ runner.temp }}/clang-asan-ubsan-junit.xml
          retention-days: 30

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: ./.github/actions/setup-linux-deps
      - name: Install coverage tools
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt coverage[toml] gcovr
      - name: Native coverage configure and build
        shell: bash
        run: |
          set -euxo pipefail
          cmake --preset linux-gcc-coverage
          cmake --build --preset linux-gcc-coverage -j1
      - name: Native coverage tests
        shell: bash
        run: |
          set -euxo pipefail
          ctest --preset linux-gcc-coverage --output-on-failure --output-junit "${RUNNER_TEMP}/coverage/native-junit.xml"
      - name: Generate native coverage reports
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/generate_native_coverage.py \
            --build-dir build/linux-gcc-coverage \
            --output-dir "${RUNNER_TEMP}/coverage/native"
      - name: Python coverage
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "${RUNNER_TEMP}/coverage/python"
          python3 -m coverage run -m unittest tests.test_dashboard_backend_status
          python3 -m coverage report | tee "${RUNNER_TEMP}/coverage/python/coverage.txt"
          python3 -m coverage xml -o "${RUNNER_TEMP}/coverage/python/coverage.xml"
      - name: Go coverage
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "${RUNNER_TEMP}/coverage/go"
          go test -coverprofile="${RUNNER_TEMP}/coverage/go/coverage.out" ./...
          go tool cover -func="${RUNNER_TEMP}/coverage/go/coverage.out" | tee "${RUNNER_TEMP}/coverage/go/coverage.txt"
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: ${{ runner.temp }}/coverage
          retention-days: 30

  package-validation:
    name: Package Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: ./.github/actions/setup-linux-deps
      - name: Configure package preset
        shell: bash
        run: cmake --preset linux-gcc-release-package
      - name: Build package preset
        shell: bash
        run: cmake --build --preset linux-gcc-release-package
      - name: Test package preset
        shell: bash
        run: ctest --preset linux-gcc-release-package --output-on-failure --output-junit "${RUNNER_TEMP}/package-validation-junit.xml"
      - name: Install package preset
        shell: bash
        run: cmake --install build/linux-gcc-release-package --prefix "${RUNNER_TEMP}/package-install"
      - name: Package with CPack
        shell: bash
        run: |
          set -euxo pipefail
          cpack --config build/linux-gcc-release-package/CPackConfig.cmake --verbose
          mkdir -p "${RUNNER_TEMP}/packages"
          find build/linux-gcc-release-package -maxdepth 1 \( -name "*.tgz" -o -name "*.zip" \) -exec cp {} "${RUNNER_TEMP}/packages/" \;
      - name: Validate downstream consumer
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/package_consumer_smoke.py \
            --install-prefix "${RUNNER_TEMP}/package-install" \
            --manifest-out "${RUNNER_TEMP}/packages/install-manifest.json"
      - name: Install syft
        shell: bash
        run: |
          set -euxo pipefail
          go install github.com/anchore/syft/cmd/syft@v1.22.0
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"
      - name: Generate SBOM and checksums
        shell: bash
        run: |
          set -euxo pipefail
          syft "dir:${RUNNER_TEMP}/package-install" -o cyclonedx-json="${RUNNER_TEMP}/packages/sbom.cdx.json"
          (
            cd "${RUNNER_TEMP}/packages"
            sha256sum ./* > SHA256SUMS.txt
          )
      - name: Upload package validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: package-validation-${{ github.sha }}
          path: |
            ${{ runner.temp }}/packages
            ${{ runner.temp }}/package-validation-junit.xml
          retention-days: 30
