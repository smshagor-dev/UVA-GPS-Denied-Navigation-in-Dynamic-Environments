services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    image: drone-swarm/control-plane:local
    ports:
      - "${DRONE_CONTROL_PLANE_PORT:-8080}:8080"
    environment:
      DRONE_SWARM_ADDR: ":8080"
      DRONE_BACKEND_MODE: "${DRONE_BACKEND_MODE:-production}"
      DRONE_BACKEND_SIMULATION_ENABLED: "${DRONE_BACKEND_SIMULATION_ENABLED:-false}"
      DRONE_BACKEND_STALE_SEC: "${DRONE_BACKEND_STALE_SEC:-5}"
      DRONE_BACKEND_DEMO_FLEET_SIZE: "${DRONE_BACKEND_DEMO_FLEET_SIZE:-5}"
      DRONE_SECURITY_PROFILE: "${DRONE_SECURITY_PROFILE:-lab}"
      DRONE_REQUIRE_SIGNED_COMMANDS: "${DRONE_REQUIRE_SIGNED_COMMANDS:-false}"
      DRONE_TLS_ENABLED: "${DRONE_TLS_ENABLED:-false}"
      DRONE_TLS_REQUIRE_CLIENT_CERT: "${DRONE_TLS_REQUIRE_CLIENT_CERT:-false}"
      DRONE_TLS_CERT_FILE: "${DRONE_TLS_CERT_FILE:-/app/certs/server.crt}"
      DRONE_TLS_KEY_FILE: "${DRONE_TLS_KEY_FILE:-/app/certs/server.key}"
      DRONE_TLS_CA_FILE: "${DRONE_TLS_CA_FILE:-/app/certs/ca.crt}"
    volumes:
      - ./logs/control-plane:/app/logs/control-plane
      - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

