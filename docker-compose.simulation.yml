services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    image: drone-swarm/control-plane:simulation
    ports:
      - "${DRONE_CONTROL_PLANE_PORT:-8080}:8080"
    environment:
      DRONE_SWARM_ADDR: ":8080"
      DRONE_BACKEND_MODE: "simulation"
      DRONE_BACKEND_SIMULATION_ENABLED: "true"
      DRONE_BACKEND_STALE_SEC: "${DRONE_BACKEND_STALE_SEC:-5}"
      DRONE_BACKEND_DEMO_FLEET_SIZE: "${DRONE_BACKEND_DEMO_FLEET_SIZE:-5}"
      DRONE_SECURITY_PROFILE: "${DRONE_SECURITY_PROFILE:-lab}"
      DRONE_REQUIRE_SIGNED_COMMANDS: "false"
      DRONE_TLS_ENABLED: "false"
      DRONE_TLS_REQUIRE_CLIENT_CERT: "false"
    volumes:
      - ./logs/control-plane:/app/logs/control-plane
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/api/v1/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

